<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>Test SVG repeat background</title>
    <style>
        body{
            height: 5000px;
            padding: 300px 0 0;
            margin: 0;
        }
        .line{
            position: relative;
            width: 100%;
            height: 475px;
            background: url(/images/drawing_opt.svg);
        }
        .line:before, .line:after{
            content: '';
            position: absolute; top: 0; bottom: 0;
            width: 381px;
        }
        .line:before{
            left: 0;
            background-image: linear-gradient(to right, #fff, rgba(0,0,0,0));
        }
        .line:after{
            right: 0;
            background-image: linear-gradient(to left, #fff, rgba(0,0,0,0));
        }
    </style>
</head>
<body>
    <div class="line">

    </div>
</body>
</html>
